<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 260" width="180" height="260">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.7  0 1 0 0 0.25  0 0 1 0 1  0 0 0 0.9 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#35a9ff"/>
      <stop offset="1" stop-color="#7446ff"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2b2860"/>
      <stop offset="1" stop-color="#16142c"/>
    </linearGradient>
  </defs>

  <!-- glow shadow -->
  <ellipse cx="90" cy="236" rx="58" ry="14" fill="rgba(0,0,0,.35)"/>
  <circle cx="90" cy="82" r="70" fill="#9b5cff" opacity=".12" filter="url(#glow)"/>

  <!-- legs -->
  <rect x="58" y="170" width="30" height="54" rx="3" fill="url(#pants)"/>
  <rect x="92" y="170" width="30" height="54" rx="3" fill="url(#pants)"/>
  <rect x="54" y="220" width="38" height="14" rx="3" fill="#202035"/>
  <rect x="88" y="220" width="38" height="14" rx="3" fill="#202035"/>

  <!-- body -->
  <rect x="48" y="100" width="84" height="78" rx="6" fill="url(#shirt)"/>
  <rect x="56" y="112" width="20" height="18" fill="#7bd7ff" opacity=".75"/>
  <rect x="100" y="124" width="20" height="18" fill="#ff5bd7" opacity=".55"/>
  <rect x="78" y="145" width="25" height="10" fill="#ffd755" opacity=".85"/>

  <!-- arms -->
  <rect x="22" y="106" width="24" height="70" rx="5" fill="#c58b62"/>
  <rect x="134" y="106" width="24" height="70" rx="5" fill="#c58b62"/>
  <rect x="20" y="102" width="28" height="35" rx="5" fill="url(#shirt)"/>
  <rect x="132" y="102" width="28" height="35" rx="5" fill="url(#shirt)"/>
  <rect x="17" y="169" width="31" height="18" rx="4" fill="#d29b73"/>
  <rect x="132" y="169" width="31" height="18" rx="4" fill="#d29b73"/>

  <!-- neck -->
  <rect x="74" y="86" width="32" height="20" fill="#bf7f5a"/>

  <!-- head -->
  <rect x="48" y="30" width="84" height="72" rx="8" fill="#d29b73"/>
  <!-- hair -->
  <rect x="48" y="30" width="84" height="22" rx="8" fill="#3b241b"/>
  <rect x="48" y="45" width="18" height="22" fill="#3b241b"/>
  <rect x="72" y="45" width="14" height="14" fill="#3b241b"/>
  <rect x="110" y="45" width="22" height="28" fill="#3b241b"/>
  <!-- eyes -->
  <rect x="68" y="66" width="12" height="8" fill="#202033"/>
  <rect x="102" y="66" width="12" height="8" fill="#202033"/>
  <rect x="72" y="66" width="4" height="3" fill="#8ee6ff"/>
  <rect x="106" y="66" width="4" height="3" fill="#8ee6ff"/>
  <!-- smile -->
  <rect x="78" y="86" width="26" height="5" rx="2" fill="#6b372d" opacity=".75"/>
  <rect x="82" y="86" width="18" height="2" fill="#f1c2aa" opacity=".8"/>

  <!-- compass -->
  <g transform="translate(129 152)" filter="url(#glow)">
    <circle cx="0" cy="0" r="14" fill="#14111e" stroke="#ffd755" stroke-width="3"/>
    <path d="M0 -9 L4 2 L0 6 L-4 2 Z" fill="#ff5b5b"/>
    <path d="M0 9 L-4 -2 L0 -6 L4 -2 Z" fill="#76d8ff" opacity=".9"/>
  </g>

  <!-- highlights pixels -->
  <rect x="38" y="23" width="8" height="8" fill="#ffd755" opacity=".8"/>
  <rect x="134" y="76" width="7" height="7" fill="#ff5bd7" opacity=".75"/>
  <rect x="32" y="194" width="6" height="6" fill="#8ee6ff" opacity=".75"/>
</svg>
