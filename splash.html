<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>天照 Loading</title>
  <style>
    @font-face {
      font-family: 'YujiSyuku';
      src: url('assets/yuji-syuku.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Minecraft';
      src: url('assets/minecraft-rus.ttf') format('truetype');
    }

    /* Дефолтные цвета (перезапишутся из localStorage) */
    :root {
      --bg:        #12101a;            /* Панели */
      --main:      #ffd755;            /* Наведение — все элементы */
      --grad-end:  #d4a017;            /* Основной — для градиента */

      --bg-r:    18;  --bg-g:    16;  --bg-b:    26;
      --main-r: 255;  --main-g: 215;  --main-b:  85;
      --grad-r: 212;  --grad-g: 160;  --grad-b:  23;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .splash {
      position: relative;
      width: 100vw;
      height: 100vh;
      border-radius: 16px;
      overflow: hidden;
      /* ✅ Фон — цвет панелей */
      background:
        linear-gradient(180deg,
          rgba(var(--bg-r), var(--bg-g), var(--bg-b), 0.99) 0%,
          rgba(var(--bg-r), var(--bg-g), var(--bg-b), 1) 100%);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(var(--main-r), var(--main-g), var(--main-b), 0.18);
      opacity: 0;
      transition: opacity .5s cubic-bezier(.16,1,.3,1);
    }
    .splash.visible { opacity: 1; }

    /* Виньетка */
    .splash::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.45) 100%);
      pointer-events: none;
    }

    /* Свечение позади заголовка — main цвет */
    .glow-orb {
      position: absolute;
      width: 280px; height: 280px;
      left: 50%; top: 95px;
      margin-left: -140px; margin-top: -140px;
      background: radial-gradient(circle,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.45) 0%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.18) 40%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.05) 65%,
        transparent 75%);
      filter: blur(14px);
      will-change: transform;
    }

    /* Иероглифы — градиент main → grad-end */
    .splash-title {
      position: absolute;
      top: 38px; left: 0; right: 0;
      text-align: center;
      font-family: 'YujiSyuku', serif;
      font-size: 64px;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--main) 0%, var(--grad-end) 100%);
      -webkit-background-clip: text;
              background-clip: text;
      -webkit-text-fill-color: transparent;
              color: transparent;
      animation: titlePulse 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(var(--main-r), var(--main-g), var(--main-b), 0.5));
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(var(--main-r), var(--main-g), var(--main-b), 0.5)); }
      50%      { filter: drop-shadow(0 0 24px rgba(var(--main-r), var(--main-g), var(--main-b), 0.85)); }
    }

    /* Подзаголовок — main */
    .splash-subtitle {
      position: absolute;
      top: 128px; left: 0; right: 0;
      text-align: center;
      font-family: 'Minecraft', sans-serif;
      font-size: 12px;
      color: rgba(var(--main-r), var(--main-g), var(--main-b), 0.85);
      letter-spacing: 6px;
      -webkit-font-smoothing: none;
    }

    /* Декоративная линия — main */
    .deco-line {
      position: absolute;
      left: 40px; right: 40px;
      top: 162px;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.5) 20%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.95) 50%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.5) 80%,
        transparent 100%);
      animation: lineShimmer 2s ease-in-out infinite;
    }

    @keyframes lineShimmer {
      0%, 100% { opacity: .7; transform: scaleX(.95); }
      50%      { opacity: 1;  transform: scaleX(1); }
    }

    /* Статус — main */
    .status-text {
      position: absolute;
      top: 180px; left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(var(--main-r), var(--main-g), var(--main-b), 0.7);
      letter-spacing: .8px;
      transition: opacity .3s ease;
    }

    /* Прогресс-бар */
    .progress-wrap {
      position: absolute;
      left: 40px; right: 40px;
      top: 218px;
      height: 12px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(var(--main-r), var(--main-g), var(--main-b), 0.3);
      border-radius: 6px;
      overflow: visible;
    }

    .progress-inner {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      overflow: hidden;
    }

    /* Заливка бара — градиент main → grad-end */
    .progress-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, var(--grad-end) 0%, var(--main) 100%);
      box-shadow:
        0 0 12px rgba(var(--main-r), var(--main-g), var(--main-b), 0.65),
        0 0 24px rgba(var(--main-r), var(--main-g), var(--main-b), 0.4);
      transition: width .1s linear;
      will-change: width;
    }

    .progress-fill::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.35) 50%,
        transparent 100%);
      animation: shimmer 1.4s linear infinite;
      transform: translateX(-100%);
    }

    @keyframes shimmer {
      to { transform: translateX(100%); }
    }

    /* Искра — main */
    .progress-edge {
      position: absolute;
      top: 50%;
      left: 0;
      width: 40px; height: 40px;
      margin-top: -20px;
      margin-left: -20px;
      background: radial-gradient(circle,
        rgba(var(--main-r), var(--main-g), var(--main-b), 1) 0%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.7) 25%,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.3) 50%,
        transparent 70%);
      pointer-events: none;
      will-change: left;
      transition: left .1s linear;
      filter: blur(2px);
      opacity: 0;
    }

    .progress-edge.active { opacity: 1; }

    /* Процент — main */
    .progress-pct {
      position: absolute;
      left: 0; right: 0;
      top: 240px;
      text-align: center;
      font-family: 'Minecraft', sans-serif;
      font-size: 11px;
      color: rgba(var(--main-r), var(--main-g), var(--main-b), 0.95);
      letter-spacing: 1.5px;
      -webkit-font-smoothing: none;
    }

    /* Версия — main */
    .version-label {
      position: absolute;
      bottom: 12px; right: 16px;
      font-size: 10px;
      color: rgba(var(--main-r), var(--main-g), var(--main-b), 0.5);
      letter-spacing: 1px;
    }

    /* Canvas для частиц */
    #particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Тонкая обводка — main */
    .splash::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg,
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.4),
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.15),
        rgba(var(--main-r), var(--main-g), var(--main-b), 0.4)) border-box;
      border: 1px solid transparent;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    /* Fade-out */
    .splash.fading {
      opacity: 0;
      transform: scale(.97);
      transition: opacity .55s cubic-bezier(.4, 0, 1, 1), transform .55s cubic-bezier(.4, 0, 1, 1);
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="glow-orb" id="glowOrb"></div>
    <canvas id="particles"></canvas>

    <div class="splash-title">天照</div>
    <div class="splash-subtitle">AMATERASU LAUNCHER</div>
    <div class="deco-line"></div>

    <div class="status-text" id="statusText">Инициализация…</div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-inner">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-edge" id="progressEdge"></div>
    </div>

    <div class="progress-pct" id="progressPct">0%</div>

    <div class="version-label">v1.0</div>
  </div>

  <script>
    // ============================================================
    // Загрузка темы: panel → bg, hover → main, primary → grad-end
    // ============================================================
    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
      };
    }

    function applyThemeFromStorage() {
      const panel   = localStorage.getItem('theme_panel')   || '#12101a';  // → bg
      const hover   = localStorage.getItem('theme_hover')   || '#ffd755';  // → main (все элементы)
      const primary = localStorage.getItem('theme_primary') || '#d4a017';  // → grad-end (второй цвет градиента)

      const bg   = hexToRgb(panel);
      const main = hexToRgb(hover);
      const grad = hexToRgb(primary);

      const root = document.documentElement;
      root.style.setProperty('--bg',       panel);
      root.style.setProperty('--main',     hover);
      root.style.setProperty('--grad-end', primary);
      root.style.setProperty('--bg-r',     bg.r);
      root.style.setProperty('--bg-g',     bg.g);
      root.style.setProperty('--bg-b',     bg.b);
      root.style.setProperty('--main-r',   main.r);
      root.style.setProperty('--main-g',   main.g);
      root.style.setProperty('--main-b',   main.b);
      root.style.setProperty('--grad-r',   grad.r);
      root.style.setProperty('--grad-g',   grad.g);
      root.style.setProperty('--grad-b',   grad.b);

      return { main, grad };
    }

    const COLORS = applyThemeFromStorage();

    // ============================================================
    // DOM
    // ============================================================
    const splash       = document.getElementById('splash');
    const glowOrb      = document.getElementById('glowOrb');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressEdge = document.getElementById('progressEdge');
    const progressPct  = document.getElementById('progressPct');
    const statusText   = document.getElementById('statusText');
    const canvas       = document.getElementById('particles');
    const ctx          = canvas.getContext('2d');

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================
    // Состояние
    // ============================================================
    let progress       = 0;
    let targetProgress = 0;
    let phase          = 0;
    let particles      = [];
    let finished       = false;
    let lastTime       = performance.now();

    setTimeout(() => splash.classList.add('visible'), 50);

    function setStartupProgress(data) {
      const p = Math.max(0, Math.min(1, Number(data.progress) || 0));
      targetProgress = p;
      if (data.text) statusText.textContent = data.text;

      if (data.done && !finished) {
        targetProgress = 1;
        finished = true;
        statusText.textContent = data.text || 'Готово!';
        setTimeout(startFadeOut, 650);
      }
    }

    if (window.electronAPI && window.electronAPI.onStartupProgress) {
      window.electronAPI.onStartupProgress(setStartupProgress);
    }

    // Стартовый минимум, чтобы лоудер не был пустым до первого ответа main-process.
    setStartupProgress({ progress: 0.03, text: 'Инициализация…' });

    // ============================================================
    // Частицы — все цвета main (один цвет для единства)
    // ============================================================
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.3 + Math.random() * 1.2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - (0.5 + Math.random() * 1.0);
        this.life = 0.5 + Math.random() * 0.5;
        this.decay = 0.008 + Math.random() * 0.012;
        this.size = 1.5 + Math.random() * 2.5;
      }
      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 0.02 * dt;
        this.life -= this.decay * dt;
        this.size *= Math.pow(0.995, dt);
      }
      alive() { return this.life > 0 && this.size > 0.3; }
      draw(ctx) {
        const alpha = Math.max(0, this.life);
        const c = COLORS.main;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
        grad.addColorStop(0,   `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha * 0.95})`);
        grad.addColorStop(0.5, `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha * 0.5})`);
        grad.addColorStop(1,   'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ============================================================
    // Прогресс
    // ============================================================
    function tickProgress(dt) {
      // Реальный прогресс приходит из main-process через startup-progress.
      // Здесь ничего не накручиваем для вида.
    }

    function startFadeOut() {
      splash.classList.add('fading');
      setTimeout(() => {
        if (window.electronAPI && window.electronAPI.splashDone) {
          window.electronAPI.splashDone();
        }
      }, 550);
    }

    // ============================================================
    // Главный цикл (120fps)
    // ============================================================
    function loop(now) {
      const dt = Math.min(2.5, (now - lastTime) / 16.67);
      lastTime = now;

      phase += 0.05 * dt;

      const diff = targetProgress - progress;
      progress += diff * 0.08 * dt;

      const pctVal   = Math.round(progress * 100);
      const widthPct = (progress * 100).toFixed(2);

      const barRect    = progressWrap.getBoundingClientRect();
      const barWidthPx = barRect.width;
      const edgeX      = barWidthPx * progress;

      progressFill.style.width = widthPct + '%';
      progressEdge.style.left  = edgeX + 'px';
      progressPct.textContent  = pctVal + '%';

      if (progress > 0.005) progressEdge.classList.add('active');
      if (finished && progress > 0.98) progressEdge.classList.remove('active');

      const orbX = Math.sin(phase * 0.7) * 24;
      const orbY = Math.cos(phase * 0.5) * 10;
      const orbScale = 1 + Math.sin(phase) * 0.12;
      glowOrb.style.transform = `translate(${orbX}px, ${orbY}px) scale(${orbScale})`;

      if (progress > 0.01 && !finished) {
        const barLeft = barRect.left;
        const barTop  = barRect.top;
        const sparkleX = barLeft + edgeX;
        const sparkleY = barTop + barRect.height / 2;
        for (let i = 0; i < 2; i++) {
          particles.push(new Particle(
            sparkleX + (Math.random() - 0.5) * 8,
            sparkleY + (Math.random() - 0.5) * 14
          ));
        }
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'screen';
      for (const p of particles) {
        p.update(dt);
        if (p.alive()) p.draw(ctx);
      }
      particles = particles.filter(p => p.alive());


      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
