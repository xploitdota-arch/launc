<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    .fire {
      position: absolute;
      left: 50%;
      top: 54%;
      width: 32px;
      height: 32px;
      transform: translate3d(-50%, -50%, 0) scale(0.2);
      opacity: 0;
      will-change: transform, opacity;
      animation: fly 900ms cubic-bezier(.18,.82,.22,1) forwards;
    }

    .core {
      position: absolute;
      inset: -7px;
      border-radius: 50% 45% 55% 45% / 55% 50% 45% 50%;
      background:
        radial-gradient(circle at 38% 30%, rgba(255,255,255,0.98) 0 7%, transparent 14%),
        radial-gradient(circle at 50% 48%, #fff4aa 0 13%, #ffd755 27%, #ff9a2e 49%, #e23535 68%, rgba(226,53,53,0) 82%);
      box-shadow:
        0 0 12px rgba(255,215,85,.9),
        0 0 24px rgba(226,53,53,.55);
      will-change: transform, border-radius;
      animation: flicker 120ms steps(2, end) infinite alternate;
    }

    .trail {
      position: absolute;
      width: 120px;
      height: 24px;
      right: 6px;
      top: 50%;
      transform: translate3d(0,-50%,0) rotate(-8deg) scaleX(0.2);
      transform-origin: right center;
      border-radius: 999px;
      background: linear-gradient(90deg,
        rgba(226,53,53,0),
        rgba(226,53,53,.16) 22%,
        rgba(255,138,42,.42) 55%,
        rgba(255,215,85,.78) 100%);
      filter: blur(5px);
      opacity: 0;
      will-change: transform, opacity;
      animation: trail 900ms cubic-bezier(.18,.82,.22,1) forwards;
    }

    .spark {
      position: absolute;
      left: 50%;
      top: calc(100% - 34px);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd755;
      opacity: 0;
      transform: translate3d(-50%, 0, 0) scale(0.2);
      box-shadow: 0 0 20px rgba(255,215,85,.9);
      animation: spark 900ms ease-out forwards;
    }

    @keyframes fly {
      0%   { opacity: 0; transform: translate3d(-50%, -50%, 0) scale(.15) rotate(-5deg); }
      12%  { opacity: 1; transform: translate3d(-50%, -78%, 0) scale(1) rotate(5deg); }
      32%  { opacity: 1; transform: translate3d(-47%, -45%, 0) scale(.92) rotate(-8deg); }
      56%  { opacity: 1; transform: translate3d(-53%, 92px, 0) scale(.62) rotate(8deg); }
      82%  { opacity: 1; transform: translate3d(-50%, 205px, 0) scale(.25) rotate(-2deg); }
      100% { opacity: 0; transform: translate3d(-50%, 238px, 0) scale(.04) rotate(0deg); }
    }

    @keyframes trail {
      0%, 8% { opacity: 0; transform: translate3d(0,-50%,0) rotate(-8deg) scaleX(.2); }
      20%    { opacity: .8; transform: translate3d(0,-50%,0) rotate(-8deg) scaleX(1); }
      72%    { opacity: .45; transform: translate3d(0,-50%,0) rotate(-8deg) scaleX(.72); }
      100%   { opacity: 0; transform: translate3d(0,-50%,0) rotate(-8deg) scaleX(.1); }
    }

    @keyframes flicker {
      from { transform: translate3d(0,0,0) scale(.96) rotate(-2deg); }
      to   { transform: translate3d(0,0,0) scale(1.05) rotate(3deg); }
    }

    @keyframes spark {
      0%, 78% { opacity: 0; transform: translate3d(-50%, 0, 0) scale(.2); }
      86%     { opacity: .95; transform: translate3d(-50%, 0, 0) scale(1.8); }
      100%    { opacity: 0; transform: translate3d(-50%, 0, 0) scale(4); }
    }
  </style>
</head>
<body>
  <div class="fire">
    <div class="trail"></div>
    <div class="core"></div>
  </div>
  <div class="spark"></div>
</body>
</html>
